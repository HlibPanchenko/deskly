services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: taskflow_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    networks:
      - taskflow
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      WWWUSER: "${WWWUSER:-1000}"

  nginx:
    image: nginx:alpine
    container_name: taskflow_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - taskflow
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: taskflow_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_DATABASE: "${DB_DATABASE:-taskflow}"
      MYSQL_USER: "${DB_USERNAME:-taskflow}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - taskflow
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD:-secret}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    container_name: taskflow_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - taskflow

networks:
  taskflow:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
